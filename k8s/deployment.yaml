apiVersion: apps/v1
kind: Deployment
metadata:
  name: gke-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gke-demo-app
  template:
    metadata:
      labels:
        app: gke-demo-app
    spec:
      containers:
      - name: gke-demo-app
        image: us-central1-docker.pkg.dev/handson-claims-2026/claims-api-repo/gke-demo-app:latest
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
